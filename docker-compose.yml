services:

  mongodb:

    image: mongo:8

    container_name: campusconnect-mongodb

    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    environment:
      MONGO_INITDB_DATABASE: campusconnect

  backend:

    build: ./server

    container_name: campusconnect-backend

    restart: always

    ports:
      - "5000:5000"

    env_file:
      - ./server/.env

    depends_on:
      - mongodb

  frontend:

    build: ./client

    container_name: campusconnect-frontend

    restart: always

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:

  mongodb_data: